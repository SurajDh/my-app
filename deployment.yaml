apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-html-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-html-app
  template:
    metadata:
      labels:
        app: my-html-app
    spec:
      containers:
      - name: nginx
        image: surajsdm/my-app:v2
        imagePullPolicy: Always
        ports:
        - containerPort: 80
