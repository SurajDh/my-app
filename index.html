<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noticeable Changes Demo</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f5f5;
}

header{
    background:#222;
    color:white;
    padding:20px;
    text-align:center;
}

/* NORMAL CONTENT */
.card{
    max-width:700px;
    margin:40px auto;
    padding:20px;
    background:white;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* USE THIS CLASS FOR NEW CHANGES */
.new-change{
    position:fixed;
    top:20px;
    right:20px;

    background:#ff0000;
    color:white;

    padding:20px 30px;
    border-radius:12px;

    font-size:24px;
    font-weight:bold;

    z-index:9999;

    animation:
        pulse 1s infinite,
        blink 0.6s infinite alternate;

    box-shadow:
        0 0 20px red,
        0 0 40px red,
        0 0 80px red;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.15);}
    100%{transform:scale(1);}
}

@keyframes blink{
    from{background:#ff0000;}
    to{background:#ffff00; color:black;}
}
</style>
</head>
<body>

<header>
    <h1>My Website</h1>
</header>

<!-- THIS IS THE CHANGE -->
<div class="new-change">
    NEW UPDATE!
</div>

<div class="card">
    <h2>Welcome to Version 1.2</h2>
    <p>This page is to test automation of ARGOCD with GIT commit changes.</p>
    <p> i am also using docker hub for images </p>

</div>

</body>
</html>
